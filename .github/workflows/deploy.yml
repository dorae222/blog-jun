name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            dorae222/blog-backend:latest
            dorae222/blog-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            dorae222/blog-frontend:latest
            dorae222/blog-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SSH_JUMP_HOST }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/blog-jun

            # Pull new images
            docker compose -f docker-compose.prod.yml pull

            # Wait for DB to be ready before migrating
            docker compose -f docker-compose.prod.yml up -d db redis
            echo "Waiting for DB..."
            for i in $(seq 1 30); do
              docker compose -f docker-compose.prod.yml exec -T db pg_isready -U ${DB_USER:-blog_user} && break
              sleep 2
            done

            # Run migrations BEFORE starting app services
            docker compose -f docker-compose.prod.yml run --rm backend python manage.py migrate --noinput

            # Start all services
            docker compose -f docker-compose.prod.yml up -d

            # Health check with retries
            echo "Running health checks..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost/api/health/ > /dev/null 2>&1; then
                echo "Health check passed (attempt $i)"
                break
              fi
              echo "Health check attempt $i failed, retrying..."
              sleep 5
            done

            # Final verification
            curl -sf http://localhost/api/health/ || echo "WARNING: Health check failed after all retries"

            # Cleanup
            docker image prune -f
